name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Test all packages
        run: pnpm -r test

      - name: Publish packages
        run: |
          for pkg in realtime client react; do
            dir="packages/$pkg"

            # Strip devDependencies and scripts for clean publish
            node -e "
              const pkg = require('./$dir/package.json');
              delete pkg.devDependencies;
              delete pkg.scripts;
              require('fs').writeFileSync('./$dir/package.json', JSON.stringify(pkg, null, 2) + '\n');
            "

            cd "$dir"
            # Only publish if this version isn't already on npm
            CURRENT=$(npm view "@mimdb/$pkg" version 2>/dev/null || echo "0.0.0")
            LOCAL=$(node -p "require('./package.json').version")
            if [ "$CURRENT" != "$LOCAL" ]; then
              echo "Publishing @mimdb/$pkg@$LOCAL (current: $CURRENT)"
              npm publish --access public --provenance
            else
              echo "Skipping @mimdb/$pkg@$LOCAL (already published)"
            fi
            cd ../..
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
