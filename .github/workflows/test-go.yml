name: Test Go SDK

on:
  push:
    paths:
      - 'go/**'
  pull_request:
    paths:
      - 'go/**'

defaults:
  run:
    working-directory: go

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Run tests
        run: go test ./... -race -count=1 -v

      - name: Vet
        run: go vet ./...
